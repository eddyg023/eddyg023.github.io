<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adding Work Experience</title>
    <link rel="stylesheet" href="/style.css">
    <script src="/script.js" defer></script>
</head>
<body>

    <div id="password">
        <div class="popup-container">
            <div class="popup-box">
                <h1>Password:</h1>
        <div id="pass-box">
            <input type="text" id="password" name="password">
        </div>

                <button class="close-btn">OK</button>
            </div>
        </div>
    
          </div>

    <div class="container">
        <h1>Add Work Experience</h1>
    
        <div class="form-group">
          <label for="name">Name of organization:</label>
          <input type="text" id="name" name="name">
        </div>

        <div class="form-group">
            <label for="name">Position:</label>
            <input type="text" id="position" name="name">
          </div>
          
          <div class="form-group">
          <label for="color">Location (CITY, ST)</label>
          <input type="text" id="location" name="located">
        </div>
    
        <div class="form-group">
          <label for="hear">Start Date:</label>
          <input type="month" id="start-date" name="starting-date">
        </input>
        </div>

        <div class="form-group">
            <label for="hear">End Date:</label>
            <input type="month" id="end-date" name="ending-date">
          </input>
          </div>

        <div class="form-group">
          <label for="hear">Present?</label>
          <input type="checkbox" id="present" name="current-job">
        </input>
        </div>
    
        <div class="form-group">
          <label for="desciptionInput">Description:</label>
          <textarea id="desciptionInput" name="desciptionInput"></textarea>
        </div>
    
        <button class="submit-button" type="submit">Submit</button>
      </div>

      <footer id="footer">
        <p>Copyright: Eddy Guo, 2024 &copy;</p>
        <button onclick="topFunction()" id="top-button">Scroll to Top</button>
    </footer>
</body>
</html>
